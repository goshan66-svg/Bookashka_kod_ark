name: Build Kivy APK (Native)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          ccache \
          libncursesw5-dev \
          libsqlite3-dev \
          sqlite3 \
          libgdbm-dev \
          libgdbm-compat-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install buildozer

    # Создаем файлы лицензий Google Android SDK заранее, чтобы buildozer не спрашивал согласия в консоли
    - name: Pre-accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Создаем директории для лицензий как в домашней папке, так и локально для buildozer
        mkdir -p ~/.android/licenses
        mkdir -p .buildozer/android/platform/android-sdk/licenses
        
        # Хэши официальных лицензий Google (включая Android SDK, Preview и SDK NDK)
        ANDROID_SDK_LICENSE="24333f8a63b6825ea9c5514f83c2829b004d1fee"
        ANDROID_SDK_PREVIEW_LICENSE="84831b9409646a918e30573bab4c9c91346d8abd"
        ANDROID_PREVIEW_LICENSE="79a253134b6ddda86869817f9152dc0ede77ea5a"
        ANDROID_SDK_ARM_DNET_LICENSE="d975f751698a77b662f1254ddbeed39cba18573d"
        
        # Записываем хэши в домашнюю папку раннера
        echo -e "$ANDROID_SDK_LICENSE\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/licenses/android-sdk-license
        echo -e "$ANDROID_SDK_PREVIEW_LICENSE" > ~/.android/licenses/android-sdk-preview-license
        echo -e "$ANDROID_PREVIEW_LICENSE" > ~/.android/licenses/android-preview-license
        echo -e "$ANDROID_SDK_ARM_DNET_LICENSE" > ~/.android/licenses/android-sdk-arm-dnet-license
        
        # Продублируем их туда, где buildozer будет разворачивать SDK локально
        echo -e "$ANDROID_SDK_LICENSE\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55" > .buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "$ANDROID_SDK_PREVIEW_LICENSE" > .buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build Android APK
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-debug
        path: bin/*.apk
