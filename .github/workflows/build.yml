name: Build Kivy APK (Native)

on:
  push:
    branches: [ "main" ] # Поменяйте на master, если необходимо
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Установка системных зависимостей, необходимых для сборки Android через Buildozer
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          ccache \
          libncursesw5-dev \
          libsqlite3-dev \
          sqlite3 \
          libgdbm-dev \
          libgdbm-compat-dev

    # Установка актуальных версий Cython и Buildozer из PyPI
    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install buildozer

    # Запуск сборки через установленный buildozer
    - name: Build Android APK
      run: |
        buildozer android debug

    # Поиск сгенерированного файла внутри скрытой папки .buildozer и его загрузка
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-debug
        path: bin/*.apk
