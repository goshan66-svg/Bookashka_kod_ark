name: Build Kivy APK

on:
  push:
    branches: [ "main" ] # Укажите вашу ветку (main или master)
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Автоматическая сборка APK через инструмент Buildozer
    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        command: buildozer android debug
        buildozer_version: stable

    # Сохранение готового APK в артефакты GitHub
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-debug
        path: ${{ steps.buildozer.outputs.filename }}
