name: Build Kivy APK with FFpyplayer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          ccache \
          libncursesw5-dev \
          libsqlite3-dev \
          sqlite3 \
          libgdbm-dev \
          libgdbm-compat-dev \
          libffi-dev \
          libssl-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install buildozer

    # Скачиваем SDK-менеджер отдельно и подписываем лицензии ДО основного запуска buildozer
    - name: Force Accept Android Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Скачиваем официальные cmdline-tools от Google вручную
        wget https://google.com -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d ./android-sdk
        
        # Переносим структуру папок так, как этого требует sdkmanager
        mkdir -p ./android-sdk/cmdline-tools/latest
        mv ./android-sdk/cmdline-tools/bin ./android-sdk/cmdline-tools/latest/
        mv ./android-sdk/cmdline-tools/lib ./android-sdk/cmdline-tools/latest/
        
        # Автоматически принимаем абсолютно все лицензии Google (включая Build-Tools 37)
        yes | ./android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses || true
        
        # Копируем подписанные лицензии в домашнюю папку и в будущую папку buildozer
        mkdir -p ~/.android/licenses
        mkdir -p .buildozer/android/platform/android-sdk/licenses
        cp -r $HOME/.buildozer/android/platform/android-sdk/licenses/* ~/.android/licenses/ || true
        cp -r $HOME/.buildozer/android/platform/android-sdk/licenses/* .buildozer/android/platform/android-sdk/licenses/ || true

    - name: Build Android APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-debug
        path: bin/*.apk
