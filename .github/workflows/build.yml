name: Build Android APK via Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build and Run via Docker
        run: |
          docker build -t buildozer-image https://github.com/kivy/buildozer.git
          docker run --rm -v ${{ github.workspace }}:/home/user/hostinvokation buildozer-image android debug
        env:
          ACCEPT_ANDROID_SDK_LICENSES: 'y'

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuestPlayer-Android-APK
          path: bin/*.apk
          retention-days: 7
