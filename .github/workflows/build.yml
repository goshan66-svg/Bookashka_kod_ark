name: Build Android APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную одной кнопкой

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Buildozer and Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.android
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git libffi-dev libssl-dev \
            autoconf automake libtool pkg-config zlib1g-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            cmake zip unzip openjdk-17-jdk

      - name: Install Python Package Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Run Buildozer Android Debug
        run: |
          buildozer android debug
        env:
          ACCEPT_ANDROID_SDK_LICENSES: 'y'

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuestPlayer-Android-APK
          path: bin/*.apk
          retention-days: 7
