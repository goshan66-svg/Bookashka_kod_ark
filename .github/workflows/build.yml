name: Build Kivy APK with FFpyplayer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          ccache \
          libncursesw5-dev \
          libsqlite3-dev \
          sqlite3 \
          libgdbm-dev \
          libgdbm-compat-dev \
          libffi-dev \
          libssl-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install buildozer

    # Насильно создаем папки и подписываем лицензии для Buildozer через системный менеджер
    - name: Force Accept Android Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Создаем структуру директорий Buildozer заранее
        BUILDOZER_SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$BUILDOZER_SDK_DIR/licenses"
        
        # Запускаем предустановленный в Ubuntu sdkmanager, перенаправляя лицензии в папку Buildozer
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root="$BUILDOZER_SDK_DIR" --licenses || true
        
        # Дублируем файлы лицензий в домашнюю папку пользователя
        mkdir -p ~/.android/licenses
        cp -r "$BUILDOZER_SDK_DIR/licenses/"* ~/.android/licenses/ || true

    - name: Build Android APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-debug
        path: bin/*.apk
