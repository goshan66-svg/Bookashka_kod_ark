name: Build Kivy APK with FFpyplayer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          ccache \
          libncursesw5-dev \
          libsqlite3-dev \
          sqlite3 \
          libgdbm-dev \
          libgdbm-compat-dev \
          libffi-dev \
          libssl-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install buildozer

    # Создаем фейковый sdkmanager по старому пути, который принудительно подпишет все лицензии
    - name: Create Smart Sdkmanager Wrapper
      run: |
        # Заранее создаем структуру папок, которую ожидает увидеть buildozer
        LEGACY_BIN_DIR="$HOME/.buildozer/android/platform/android-sdk/tools/bin"
        mkdir -p "$LEGACY_BIN_DIR"
        
        # Пишем скрипт-перехватчик
        cat << 'EOF' > "$LEGACY_BIN_DIR/sdkmanager"
        #!/bin/bash
        # Перенаправляем все вызовы на настоящий, современный системный sdkmanager от GitHub
        # При этом автоматически подставляем "yes", чтобы принять любые лицензии (включая 37-ю версию)
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk "$@"
        EOF
        
        # Даем права на исполнение нашего скрипта-заглушки
        chmod +x "$LEGACY_BIN_DIR/sdkmanager"

    - name: Build Android APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-app-debug
        path: bin/*.apk
